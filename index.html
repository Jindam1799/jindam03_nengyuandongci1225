<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>진담중국어 - 중국어 문장 배열 게임</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      (function () {
        const userAgent = navigator.userAgent.toLowerCase();

        // 카카오톡 인앱 브라우저이고, 안드로이드인 경우
        if (
          userAgent.indexOf('kakaotalk') > -1 &&
          userAgent.indexOf('android') > -1
        ) {
          location.href =
            'kakaotalk://web/openExternal?url=' +
            encodeURIComponent(window.location.href);
        }
      })();
    </script>
  </head>
  <body>
    <audio id="bgm-lobby" src="lobby.mp3" loop></audio>

    <div id="popup-overlay" class="hidden"></div>

    <div id="popup-intro" class="popup hidden">
      <h2>게임 소개</h2>
      <p>업데이트 중입니다!! 음성 녹음 및 재생 기능 등</p>
      <p>제한 시간은 30초입니다. 모든 문장을 맞추고 복습까지 완료해 보세요!</p>
      <button id="btn-close-intro" class="primary-btn mt-20">게임 시작</button>
    </div>

    <div id="popup-success" class="popup hidden">
      <h2 class="success-title">1초안에 툭!</h2>
      <div class="completed-sentence-box">
        <p id="success-korean"></p>
        <p id="success-chinese"></p>
      </div>

      <div class="recorder-box">
        <p class="recorder-guide">
          마이크 버튼을 눌러 내 발음을 녹음해 보세요!
        </p>
        <div class="voice-btns">
          <button id="btn-record-voice" class="btn-voice">🎙️ 녹음하기</button>
          <button id="btn-play-my-voice" class="btn-voice" disabled>
            🎧 내 발음
          </button>
          <button id="btn-play-tts" class="btn-voice">🔊 원어민</button>
        </div>
      </div>

      <div class="popup-actions">
        <button id="btn-next-sentence" class="primary-btn">다음 문장</button>
      </div>
    </div>

    <div id="popup-review" class="popup hidden">
      <h2>오늘의 복습 📚</h2>
      <p class="subtitle">틀렸던 문장은 붉은색으로 표시됩니다.</p>
      <div id="review-list" class="review-container"></div>
      <button id="btn-return-lobby" class="primary-btn mt-20">
        로비로 돌아가기
      </button>
    </div>

    <div id="app">
      <section id="screen-intro" class="screen active">
        <div class="intro-content">
          <h1 class="logo-title">진담중국어</h1>
          <p class="subtitle">화면을 터치하여 시작하세요</p>
        </div>
      </section>

      <section id="screen-lobby" class="screen">
        <div id="day-buttons" class="grid-container"></div>
      </section>

      <section id="screen-game" class="screen">
        <div class="top-nav">
          <button id="btn-ingame-lobby" class="text-btn">⬅ 로비로</button>
          <div class="timer-box">
            <span class="timer-icon">⏱️</span>
            <span id="timer">30</span>
          </div>
        </div>

        <div class="game-header">
          <div class="status-bar">
            <span id="level-indicator" class="badge">Level 1</span>
          </div>
          <div class="korean-box">
            <h2 id="korean-sentence">한국어 문장</h2>
          </div>
        </div>

        <div class="game-board">
          <div id="answer-slots" class="slots-container"></div>
        </div>

        <div class="game-controls">
          <div id="word-bank" class="words-container"></div>
        </div>
      </section>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
